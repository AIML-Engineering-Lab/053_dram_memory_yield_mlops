# ═══════════════════════════════════════════════════════════════
# P053 — Kubernetes Deployment
# ═══════════════════════════════════════════════════════════════
# Production deployment: 2 replicas, resource limits, probes,
# rolling update strategy.
#
# Why these resource limits?
#   - Model: ~350MB memory (317K params × float32 + overhead)
#   - PyTorch runtime: ~300MB
#   - FastAPI + uvicorn: ~200MB
#   - Safety buffer: 2x = ~2Gi limit
#   - CPU: inference is CPU-bound per request (~10ms)
#     0.5 CPU handles ~100 req/s per pod
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-yield-predictor
  namespace: aiml-prod
  labels:
    app: memory-yield-predictor
    version: v1
    team: smai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memory-yield-predictor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: memory-yield-predictor
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: predictor
          image: ghcr.io/rajendarmuddasani/dram-yield-predictor:v1
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: yield-predictor-config
                  key: model_version
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
