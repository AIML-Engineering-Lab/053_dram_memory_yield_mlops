# ═══════════════════════════════════════════════════════════════
# P053 — Big Data Stack: Kafka + Spark + Airflow + Monitoring
# ═══════════════════════════════════════════════════════════════
#
# Memory Requirements:
#   Minimum: 10 GB Docker Desktop memory
#   Recommended: 12 GB+ for full Spark workers
#
# Start:
#   docker compose -f deploy/docker-compose-bigdata.yml up -d
#
# Stop:
#   docker compose -f deploy/docker-compose-bigdata.yml down
#
# Verify:
#   docker compose -f deploy/docker-compose-bigdata.yml ps
#
# Service Ports:
#   Kafka:       localhost:9092  (broker)
#   Spark UI:    localhost:8080  (master)
#   Airflow:     localhost:8888  (webserver)
#   Prometheus:  localhost:9090
#   Grafana:     localhost:3000  (admin/admin)
#   LocalStack:  localhost:4566  (S3, SageMaker)
#   Kafdrop:     localhost:9000  (Kafka UI)
# ═══════════════════════════════════════════════════════════════

name: p053-bigdata

services:
  # ─── KAFKA CLUSTER ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: p053-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: p053-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.1
    container_name: p053-kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms64m -Xmx128m"
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── SPARK CLUSTER ──────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: p053-spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    volumes:
      - ../data:/data
      - ../src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  spark-worker-1:
    image: bitnami/spark:3.5.1
    container_name: p053-spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ../data:/data
      - ../src:/app/src
    deploy:
      resources:
        limits:
          memory: 2G

  spark-worker-2:
    image: bitnami/spark:3.5.1
    container_name: p053-spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ../data:/data
      - ../src:/app/src
    deploy:
      resources:
        limits:
          memory: 2G

  # ─── AIRFLOW ──────────────────────────────────────────────
  airflow-postgres:
    image: postgres:16-alpine
    container_name: p053-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    container_name: p053-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    volumes:
      - ../deploy/airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../src:/opt/airflow/src

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: p053-airflow-web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8888:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    command: webserver
    volumes:
      - ../deploy/airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../src:/opt/airflow/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: p053-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: scheduler
    volumes:
      - ../deploy/airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - ../src:/opt/airflow/src
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── MONITORING ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: p053-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.3.3
    container_name: p053-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ../deploy/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── LOCALSTACK (AWS S3 + SageMaker emulation) ──────────
  localstack:
    image: localstack/localstack:3.2
    container_name: p053-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sagemaker
      DEBUG: 0
      DEFAULT_REGION: us-west-2
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── MLFLOW PostgreSQL Backend ─────────────────────────────
  mlflow-postgres:
    image: postgres:16-alpine
    container_name: p053-mlflow-db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── MLFLOW TRACKING SERVER ─────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: p053-mlflow
    ports:
      - "5001:5000"
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow
      - --default-artifact-root=s3://p053-mlflow-artifacts/
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-west-2
      MLFLOW_S3_ENDPOINT_URL: http://localstack:4566
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  airflow-db-data:
  grafana-data:
  localstack-data:
  mlflow-pg-data:
