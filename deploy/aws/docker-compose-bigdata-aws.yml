# ═══════════════════════════════════════════════════════════════
# P053 — AWS Production Big Data Stack
# ═══════════════════════════════════════════════════════════════
#
# Production deployment on g4dn.xlarge (4 vCPU, 16GB RAM, T4 GPU)
#
# Key differences from local docker-compose-bigdata.yml:
#   - NO LocalStack → real S3 (s3://p053-mlflow-artifacts)
#   - NO local MLflow PostgreSQL → real RDS (db.t3.micro)
#   - NVIDIA GPU runtime on Airflow scheduler (runs training)
#   - AWS credentials via IAM role (no hardcoded keys)
#   - Memory limits tuned for g4dn.xlarge (16GB total)
#
# Prerequisites:
#   - g4dn.xlarge EC2 instance with NVIDIA drivers installed
#   - nvidia-container-toolkit installed
#   - RDS PostgreSQL running (from setup_aws.sh)
#   - S3 bucket created (p053-mlflow-artifacts)
#   - .env file with real secrets
#
# Start:
#   cd /home/ec2-user/053_memory_yield_predictor
#   docker compose -f deploy/aws/docker-compose-bigdata-aws.yml --env-file deploy/aws/.env up -d
#
# Instance budget: g4dn.xlarge = $0.526/hr
# ═══════════════════════════════════════════════════════════════

name: p053-aws-bigdata

services:
  # ─── KAFKA CLUSTER ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: p053-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: p053-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.1
    container_name: p053-kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32m -Xmx64m"
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── SPARK CLUSTER ──────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: p053-spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    volumes:
      - ../../data:/data
      - ../../src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  spark-worker-1:
    image: bitnami/spark:3.5.1
    container_name: p053-spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ../../data:/data
      - ../../src:/app/src
    deploy:
      resources:
        limits:
          memory: 2560M

  spark-worker-2:
    image: bitnami/spark:3.5.1
    container_name: p053-spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ../../data:/data
      - ../../src:/app/src
    deploy:
      resources:
        limits:
          memory: 2560M

  # ─── AIRFLOW (with NVIDIA GPU access for training) ─────────
  airflow-postgres:
    image: postgres:16-alpine
    container_name: p053-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  airflow-init:
    image: p053-airflow-gpu:latest
    container_name: p053-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../../data:/opt/airflow/data
      - ../../src:/opt/airflow/src
      - ../../models:/opt/airflow/models

  airflow-webserver:
    image: p053-airflow-gpu:latest
    container_name: p053-airflow-web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8888:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      # AWS credentials (IAM role handles auth on EC2)
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      S3_BUCKET: ${S3_BUCKET:-p053-mlflow-artifacts}
      # MLflow pointing to real RDS
      MLFLOW_TRACKING_URI: postgresql://mlflow:${MLFLOW_DB_PASSWORD}@${MLFLOW_DB_HOST}:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: s3://${S3_BUCKET:-p053-mlflow-artifacts}/mlartifacts/
    command: webserver
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../../data:/opt/airflow/data
      - ../../src:/opt/airflow/src
      - ../../models:/opt/airflow/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Scheduler has GPU access for running training tasks
  airflow-scheduler:
    image: p053-airflow-gpu:latest
    container_name: p053-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # AWS credentials (IAM role handles auth on EC2)
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      S3_BUCKET: ${S3_BUCKET:-p053-mlflow-artifacts}
      # MLflow pointing to real RDS
      MLFLOW_TRACKING_URI: postgresql://mlflow:${MLFLOW_DB_PASSWORD}@${MLFLOW_DB_HOST}:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: s3://${S3_BUCKET:-p053-mlflow-artifacts}/mlartifacts/
      # NVIDIA GPU visibility
      NVIDIA_VISIBLE_DEVICES: all
    command: scheduler
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../../data:/opt/airflow/data
      - ../../src:/opt/airflow/src
      - ../../models:/opt/airflow/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4G

  # ─── MLFLOW TRACKING SERVER (connects to RDS + S3) ─────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: p053-mlflow
    ports:
      - "5001:5000"
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://mlflow:${MLFLOW_DB_PASSWORD}@${MLFLOW_DB_HOST}:5432/mlflow
      - --default-artifact-root=s3://${S3_BUCKET:-p053-mlflow-artifacts}/mlartifacts/
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      # IAM role on EC2 handles S3 auth — no hardcoded keys
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── MONITORING ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: p053-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:10.3.3
    container_name: p053-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  airflow-db-data:
  grafana-data:
