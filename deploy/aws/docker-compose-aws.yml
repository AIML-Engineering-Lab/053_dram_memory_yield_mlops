# ═══════════════════════════════════════════════════════════════
# P053 — AWS Production Stack
# ═══════════════════════════════════════════════════════════════
#
# Deploy on AWS EC2 (t3.xlarge recommended) or ECS Fargate.
#
# Prerequisites:
#   - RDS PostgreSQL instance for MLflow
#   - S3 bucket for MLflow artifacts
#   - ECR push for API image
#   - IAM role with S3/RDS/SageMaker access
#
# Environment:
#   Set these in .env or AWS Secrets Manager:
#     MLFLOW_DB_HOST, MLFLOW_DB_PASSWORD
#     AWS_DEFAULT_REGION, S3_BUCKET
#
# Usage:
#   # Copy .env.aws.template → .env and fill in secrets
#   docker compose -f deploy/aws/docker-compose-aws.yml up -d
#
# Interview talking point:
#   "Same compose file works local→Docker→AWS. Only the env vars change.
#   RDS handles PostgreSQL HA, S3 handles artifact durability, and the
#   MLflow server is stateless — we can scale horizontally."
# ═══════════════════════════════════════════════════════════════

name: p053-aws

services:
  # ─── PREDICTION API ──────────────────────────────────────────
  api:
    image: ${ECR_REPO:-053-memory-yield-predictor}:${IMAGE_TAG:-latest}
    container_name: p053-api
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: postgresql://mlflow:${MLFLOW_DB_PASSWORD}@${MLFLOW_DB_HOST}:5432/mlflow
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ─── REDIS CACHE ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: p053-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ─── MLFLOW TRACKING SERVER (connects to RDS + S3) ──────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: p053-mlflow
    ports:
      - "5001:5000"
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://mlflow:${MLFLOW_DB_PASSWORD}@${MLFLOW_DB_HOST}:5432/mlflow
      - --default-artifact-root=s3://${S3_BUCKET:-p053-mlflow-artifacts}/mlartifacts/
    environment:
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      # IAM role attached to EC2/ECS handles S3 auth — no keys needed
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ─── PROMETHEUS ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: p053-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ─── GRAFANA ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: p053-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../docker/grafana_provisioning:/etc/grafana/provisioning:ro
      - ../docker/grafana_dashboard.json:/var/lib/grafana/dashboards/p053.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
